# split panes using prefix \ and prefix -
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"' 
unbind '%'

# open new windows in current directory
bind c new-window -c "#{pane_current_path}"

# remap prefix from C-b to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# switch panes with meta key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-[ select-pane -t -1
bind -n M-] select-pane -t +1
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch windows with meta key
bind -n M-, select-window -t -1
bind -n M-. select-window -t +1

# reload config file
bind r source-file ~/.tmux.conf

# enable vim bindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy -p'

# don't rename windows automatically
set-option -g allow-rename off

# Change inactive window color: 
set -g window-status-style bg=#98971a,fg=black

# Change active window color
set -g window-status-current-style bg=red,fg=white

# Change border color of all panes
set -g pane-border-style "fg=grey"

# Change active pane border color hightlight
set -g pane-active-border-style "fg=grey, bg=green"

# Set the base index for windows to 1 instead of 0
set -g base-index 1

# Set the base index for panes to 1 instead of 0
set -g pane-base-index 1

# Get rid of delay
set -s escape-time 0

# Date format
set-option -g status-right '%a %Y-%m-%d %H:%M %Z  '
