- name: sudo setup
  hosts: localhost
  remote_user: cjordan
  become_method: sudo
  vars:
    host_user_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"
    src: "{{ host_user_home }}/configs/system/sudoers.d"
    dest: "/etc/sudoers.d"
  tasks:
    - name: Find sudoers files
      ansible.builtin.find:
        paths: "{{ src }}"
        file_type: file
      register: files

    - name: Add files /etc/sudoers.d
      become: yes
      ansible.builtin.template:
        src: "{{ item.path }}"
        dest: "{{ dest }}/{{ item.path | basename }}"
        owner: root
        group: root
        mode: '0440'
        validate: sudo /usr/bin/visudo -cf %s
      loop: "{{ files.files }}"

