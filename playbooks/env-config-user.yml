- name: user shell configuration
  hosts: localhost
  gather_facts: yes
  remote_user: cjordan
  become: no
  vars_files: 
    - vars.yml
  tasks:
    - name: hard link bashrc
      ansible.builtin.file:
        src: "{{ shell_config_src }}/bashrc"
        dest: "{{ host_user_home }}/.bashrc"
        state: hard
        force: true
    - name: hard link bash_profile
      ansible.builtin.file:
        src: "{{ shell_config_src }}/bash_profile"
        dest: "{{ host_user_home }}/.bash_profile"
        state: hard
        force: true
    - name: hard link inputrc
      ansible.builtin.file:
        src: "{{ shell_config_src }}/inputrc"
        dest: "{{ host_user_home }}/.inputrc"
        state: hard
        force: true
    - name: hard link bash_logout
      ansible.builtin.file:
        src: "{{ shell_config_src }}/bash_logout"
        dest: "{{ host_user_home }}/.bash_logout"
        state: hard
        force: true
    - name: hard link profile
      ansible.builtin.file:
        src: "{{ shell_config_src }}/profile"
        dest: "{{ host_user_home }}/.profile"
        state: hard
        force: true

- name: home configuration
  hosts: localhost
  gather_facts: yes
  remote_user: cjordan
  become: no
  vars_files: 
    - vars.yml
  tasks:
    - name: hard link user-dirs.dirs
      ansible.builtin.file:
        src: "{{ user_dirs_src }}/user-dirs.dirs"
        dest: "{{ host_user_home }}/.config/user-dirs.dirs"
        state: hard
        force: true
    - name: turn off xdg user-dirs.dirs auto generate
      become: yes
      ansible.builtin.lineinfile:
        path: /etc/xdg/user-dirs.conf
        regexp: '^enabled=True'
        line: enabled=False
        owner: root
        group: root
        mode: '0644'
