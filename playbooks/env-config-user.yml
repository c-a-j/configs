- name: Shell Configuration
  hosts: localhost
  gather_facts: yes
  remote_user: cjordan
  become: no
  vars_files: 
    - vars.yml
  tasks:
    - name: hard link bashrc
      ansible.builtin.file:
        src: "{{ shell_config_src }}/bashrc"
        dest: "{{ host_user_home }}/.bashrc"
        state: hard
        force: true
    - name: hard link bash_profile
      ansible.builtin.file:
        src: "{{ shell_config_src }}/bash_profile"
        dest: "{{ host_user_home }}/.bash_profile"
        state: hard
        force: true
    - name: hard link inputrc
      ansible.builtin.file:
        src: "{{ shell_config_src }}/inputrc"
        dest: "{{ host_user_home }}/.inputrc"
        state: hard
        force: true
    - name: hard link bash_logout
      ansible.builtin.file:
        src: "{{ shell_config_src }}/bash_logout"
        dest: "{{ host_user_home }}/.bash_logout"
        state: hard
        force: true

- name: Home configuration
  hosts: localhost
